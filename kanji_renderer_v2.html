<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanji Renderer V2 - Dark/Light Mode</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Yuji+Boku&display=swap" rel="stylesheet">
    <style>
        /* Định nghĩa CSS Variables cho 2 chế độ màu */
        :root {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --container-bg: #1e1e1e;
            --title-color: #ffffff;
            --input-bg: #2a2a2a;
            --input-border: #3a3a3a;
            --input-text: #ffffff;
            --box-bg: #161616;
            --box-border: #444444;
            --grid-line: #333333;
            --grid-main: #444444;
            --suggest-bg: #2d2d2d;
            --suggest-border: #444444;
            --suggest-text: #e0e0e0;
            --hint-color: #666666;
        }

        [data-theme="light"] {
            --bg-color: #f5f7fb;
            --text-color: #333333;
            --container-bg: #ffffff;
            --title-color: #111111;
            --input-bg: #ffffff;
            --input-border: #cccccc;
            --input-text: #222222;
            --box-bg: #fcfcfc;
            --box-border: #bbbbbb;
            --grid-line: #dddddd;
            --grid-main: #999999;
            --suggest-bg: #eeeeee;
            --suggest-border: #cccccc;
            --suggest-text: #333333;
            --hint-color: #888888;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s, border-color 0.3s, color 0.3s;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 650px;
            width: 100%;
            background-color: var(--container-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        /* Header & Control Panel */
        .header-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--input-border);
            padding-bottom: 15px;
        }

        h1 {
            font-size: 20px;
            color: var(--title-color);
            letter-spacing: 0.5px;
        }

        /* Switch Toggle Style */
        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 500;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #555555;
            transition: .3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #4f46e5;
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }

        /* Layout CSS */
        .input-group {
            margin-bottom: 20px;
        }

        .row-controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .row-controls .input-group {
            flex: 1;
            margin-bottom: 0;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-color);
            font-weight: 500;
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            border: 2px solid var(--input-border);
            border-radius: 6px;
            color: var(--input-text);
            font-size: 16px;
        }

        input[type="text"]:focus, input[type="number"]:focus {
            outline: none;
            border-color: #4f46e5;
        }

        .hint-text {
            font-size: 12px;
            color: var(--hint-color);
            margin-top: 5px;
        }

        /* Suggestions Area */
        .suggestions {
            display: flex;
            gap: 8px;
            margin-top: -10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            min-height: 30px;
        }

        .btn-suggest {
            background-color: var(--suggest-bg);
            color: var(--suggest-text);
            border: 1px solid var(--suggest-border);
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 14px;
        }

        .btn-suggest:hover, .btn-suggest.active {
            background-color: #4f46e5;
            border-color: #4f46e5;
            color: #fff;
        }

        /* Render Area */
        .render-area {
            display: flex;
            justify-content: space-around;
            margin-top: 25px;
            flex-wrap: wrap;
            gap: 20px;
            border-top: 1px solid var(--input-border);
            padding-top: 25px;
        }

        .render-box-wrapper {
            text-align: center;
        }

        .render-title {
            font-size: 13px;
            color: var(--hint-color);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .kanji-box {
            position: relative;
            width: 220px;
            height: 220px;
            background-color: var(--box-bg);
            border: 2px solid var(--box-border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .kanji-text {
            font-size: 115px; /* Mặc định ban đầu */
            z-index: 2;
            user-select: none;
            color: var(--title-color);
        }

        .font-standard {
            font-family: 'Noto Sans JP', sans-serif;
        }

        .font-calligraphy {
            font-family: 'Yuji Boku', serif;
        }

        /* Grid Lines Layer */
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .grid-overlay line {
            stroke: var(--grid-line);
            stroke-dasharray: 4 4;
            stroke-width: 1.2;
        }

        .grid-overlay .main-cross {
            stroke: var(--grid-main);
            stroke-dasharray: 5 4;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-panel">
        <h1>Bộ Render Kanji V2</h1>
        <!-- Nút gạt Dark Mode / Light Mode -->
        <div class="toggle-container">
            <span>Chế độ sáng</span>
            <label class="switch">
                <input type="checkbox" id="theme-toggle" checked>
                <span class="slider"></span>
            </label>
            <span>Chế độ tối</span>
        </div>
    </div>
    
    <!-- Hàng chứa ô nhập Kanji và Ô nhập kích thước chữ -->
    <div class="row-controls">
        <div class="input-group">
            <label for="input-kanji">Ô gõ chữ Kanji</label>
            <input type="text" id="input-kanji" placeholder="Nhập chữ Kanji..." autocomplete="off">
        </div>
        
        <!-- Ô điều chỉnh kích thước chữ trực quan -->
        <div class="input-group" style="flex: 0 0 160px;">
            <label for="input-fontsize">Cỡ chữ hiện tại (px)</label>
            <input type="number" id="input-fontsize" value="115" min="30" max="200" step="5">
        </div>
    </div>

    <!-- Ô nhập phiên âm Hán Việt -->
    <div class="input-group">
        <label for="input-hanviet">Ô gõ phiên âm Hán Việt</label>
        <input type="text" id="input-hanviet" placeholder="Ví dụ: gian, thuy, hieu, cao..." autocomplete="off">
        <div class="hint-text">Gõ ô nào, hệ thống tự động xóa dữ liệu ô còn lại.</div>
    </div>

    <div class="suggestions" id="suggestions-area"></div>

    <!-- Kết quả hiển thị kèm khung kẻ chữ mễ -->
    <div class="render-area">
        <div class="render-box-wrapper">
            <div class="render-title">Font Đánh Máy</div>
            <div class="kanji-box">
                <svg class="grid-overlay" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <line x1="0" y1="0" x2="100" y2="100" />
                    <line x1="100" y1="0" x2="0" y2="100" />
                    <line x1="50" y1="0" x2="50" y2="100" class="main-cross" />
                    <line x1="0" y1="50" x2="100" y2="50" class="main-cross" />
                </svg>
                <div class="kanji-text font-standard" id="output-standard">-</div>
            </div>
        </div>

        <div class="render-box-wrapper">
            <div class="render-title">Font Thư Pháp</div>
            <div class="kanji-box">
                <svg class="grid-overlay" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <line x1="0" y1="0" x2="100" y2="100" />
                    <line x1="100" y1="0" x2="0" y2="100" />
                    <line x1="50" y1="0" x2="50" y2="100" class="main-cross" />
                    <line x1="0" y1="50" x2="100" y2="50" class="main-cross" />
                </svg>
                <div class="kanji-text font-calligraphy" id="output-calligraphy">-</div>
            </div>
        </div>
    </div>
</div>

<script>
    // Dictionary đồng bộ mẫu
    const dictionary = {
        "gian": ["間"], "thủy": ["水"], "thuy": ["水"],
        "hiệu": ["校", "効", "号"], "hieu": ["校", "効", "号"],
        "cao": ["高"], "cổ": ["古"], "co": ["古"], "dạ": ["夜"], "da": ["夜"],
        "điền": ["田"], "dien": ["田"], "điện": ["電"], " học": ["学"], "sinh": ["生"]
    };

    const hvInput = document.getElementById('input-hanviet');
    const kjInput = document.getElementById('input-kanji');
    const fsInput = document.getElementById('input-fontsize');
    const themeToggle = document.getElementById('theme-toggle');
    
    const outStandard = document.getElementById('output-standard');
    const outCalligraphy = document.getElementById('output-calligraphy');
    const suggestionsArea = document.getElementById('suggestions-area');

    // 1. Xử lý Chuyển đổi Dark / Light Mode bằng toggle gạt
    themeToggle.addEventListener('change', () => {
        if (themeToggle.checked) {
            document.documentElement.removeAttribute('data-theme');
        } else {
            document.documentElement.setAttribute('data-theme', 'light');
        }
    });

    // 2. Xử lý thay đổi kích thước Font trực quan
    fsInput.addEventListener('input', () => {
        let size = fsInput.value;
        if (size < 30) size = 30; // Giới hạn dưới để tránh lỗi biến mất chữ
        if (size > 200) size = 200; // Giới hạn trên để tránh tràn khung
        
        outStandard.style.fontSize = size + 'px';
        outCalligraphy.style.fontSize = size + 'px';
    });

    // Các hàm xử lý logic render cốt lõi kế thừa từ V1
    function updateRender(char) {
        if (char) {
            outStandard.textContent = char;
            outCalligraphy.textContent = char;
        } else {
            outStandard.textContent = "-";
            outCalligraphy.textContent = "-";
        }
    }

    function clearSuggestions() {
        suggestionsArea.innerHTML = "";
    }

    hvInput.addEventListener('input', () => {
        const value = hvInput.value.trim().toLowerCase();
        if (value !== "") {
            kjInput.value = "";
            clearSuggestions();
            if (dictionary[value]) {
                const listKanji = dictionary[value];
                if (listKanji.length > 1) {
                    listKanji.forEach((kanji, idx) => {
                        const btn = document.createElement('button');
                        btn.className = `btn-suggest ${idx === 0 ? 'active' : ''}`;
                        btn.textContent = kanji;
                        btn.addEventListener('click', () => {
                            document.querySelectorAll('.btn-suggest').forEach(b => b.classList.remove('active'));
                            btn.classList.add('active');
                            updateRender(kanji);
                        });
                        suggestionsArea.appendChild(btn);
                    });
                    updateRender(listKanji[0]);
                } else {
                    updateRender(listKanji[0]);
                }
            } else {
                updateRender("?");
            }
        } else {
            clearSuggestions();
            updateRender("-");
        }
    });

    kjInput.addEventListener('input', () => {
        const value = kjInput.value.trim();
        if (value !== "") {
            hvInput.value = "";
            clearSuggestions();
            updateRender(value.charAt(0));
        } else {
            updateRender("-");
        }
    });
</script>

</body>
</html>
